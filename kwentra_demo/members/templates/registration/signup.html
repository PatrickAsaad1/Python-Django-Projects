<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Kwentra</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0a1628;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .signup-box {
        background: #0d1f3c;
        padding: 40px;
        border-radius: 10px;
        border: 1px solid #1a3a5c;
        width: 400px;
        text-align: center;
      }
      .signup-box h1 {
        color: #00d4ff;
        margin-bottom: 20px;
      }
      .signup-box input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #1a3a5c;
        border-radius: 5px;
        background: #0a1628;
        color: white;
        font-size: 1rem;
      }
      .signup-box button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #00d4ff;
        color: #0a1628;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
      }
      .signup-box button:hover {
        background: #00b8e6;
      }
      .signup-box a {
        color: #00d4ff;
        text-decoration: none;
      }
      .error {
        color: #ff4444;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="signup-box">
      <h1>Create Account</h1>

      <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input type="email" name="email" placeholder="Email" required />
        <input
          type="password"
          name="password1"
          placeholder="Password"
          required
        />
        <input
          type="password"
          name="password2"
          placeholder="Confirm Password"
          required
        />
        <button type="submit">Sign Up</button>
      </form>

      <p style="margin-top: 15px">
        Already have an account? <a href="/login/">Login</a>
      </p>
    </div>
  </body>
</html>
