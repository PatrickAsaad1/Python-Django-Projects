<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kwentra — Members Portal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0a1628;
        color: white;
        line-height: 1.6;
      }
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 80px;
        background: #0d1f3c;
        border-bottom: 1px solid #1a3a5c;
      }
      .logo {
        font-size: 1.8rem;
        font-weight: bold;
        color: #00d4ff;
      }
      .nav-links a {
        color: #b0c4de;
        text-decoration: none;
        margin-left: 30px;
        font-size: 1rem;
        transition: color 0.3s;
      }
      .nav-links a:hover {
        color: #00d4ff;
      }
      .hero {
        text-align: center;
        padding: 100px 20px;
      }
      .hero h1 {
        font-size: 3rem;
        color: #00d4ff;
        margin-bottom: 20px;
      }
      .hero p {
        font-size: 1.2rem;
        color: #b0c4de;
        max-width: 600px;
        margin: 0 auto;
      }
      footer {
        text-align: center;
        padding: 30px;
        background: #0d1f3c;
        color: #b0c4de;
        border-top: 1px solid #1a3a5c;
        position: fixed;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">Kwentra</div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/members/">Members</a>
      </div>
    </nav>

    <section class="hero">
      <h1>Members Portal</h1>
      <p>
        Welcome, Kwentra team members. Access your dashboard, projects, and
        resources here.
      </p>
    </section>

    <footer>
      <p>&copy; 2026 Kwentra. All rights reserved.</p>
    </footer>
  </body>
</html>
