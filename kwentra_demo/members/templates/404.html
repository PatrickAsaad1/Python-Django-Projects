<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Kwentra</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0a1628;
        color: white;
        text-align: center;
        padding: 100px 20px;
      }
      h1 {
        font-size: 6rem;
        color: #00d4ff;
        margin-bottom: 10px;
      }
      h2 {
        font-size: 2rem;
        color: #b0c4de;
        margin-bottom: 20px;
      }
      p {
        color: #b0c4de;
        margin-bottom: 40px;
      }
      a {
        display: inline-block;
        padding: 12px 30px;
        background: #00d4ff;
        color: #0a1628;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      }
      a:hover {
        background: #00b8e6;
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </body>
</html>
